<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <meta name="theme-color" content="#059669" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="canonical" href="https://trekops.in/" />

    <title>TrekOps | WhatsApp Booking & Trek Operations CRM for India</title>
    <meta name="description" content="TrekOps is the all-in-one CRM for trekking & adventure operators in India. Automate WhatsApp bookings with the official Business API — no bans, no limits. Manage treks, departures, customers, payments and finance from one dashboard." />
    <meta name="keywords" content="trekking CRM, WhatsApp Business API India, trek booking software, adventure travel CRM, tour operator software, WhatsApp chatbot for travel, trekking ERP India, AI WhatsApp bot, booking automation, departure management, GST invoicing trek, Razorpay travel SaaS" />
    <meta name="author" content="TrekOps" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="googlebot" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trekops.in/" />
    <meta property="og:site_name" content="TrekOps" />
    <meta property="og:title" content="TrekOps | WhatsApp Booking & Trek Operations CRM for India" />
    <meta property="og:description" content="Turn social-media ad clicks into bookings on WhatsApp — automatically. Powered by the official WhatsApp Business API. No bans. No message limits. Built for Indian trek & adventure operators." />
    <meta property="og:image" content="https://trekops.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://trekops.in/" />
    <meta name="twitter:title" content="TrekOps | WhatsApp Booking & Trek Operations CRM for India" />
    <meta name="twitter:description" content="Automate trek bookings on WhatsApp Business API. No bans, no limits, AI-powered replies. The complete CRM for Indian trek operators." />
    <meta name="twitter:image" content="https://trekops.in/og-image.png" />

    <!-- Preconnect / Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TrekOps",
      "url": "https://trekops.in/",
      "logo": "https://trekops.in/logo.png",
      "description": "All-in-one CRM and WhatsApp automation platform for trekking and adventure travel operators in India.",
      "address": { "@type": "PostalAddress", "addressCountry": "IN" },
      "contactPoint": [{
        "@type": "ContactPoint",
        "telephone": "+91-84648-92914",
        "contactType": "customer support",
        "areaServed": "IN",
        "availableLanguage": ["English", "Hindi"]
      }],
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TrekOps",
      "operatingSystem": "Web",
      "applicationCategory": "BusinessApplication",
      "offers": [
        { "@type": "Offer", "price": "0",    "priceCurrency": "INR", "name": "Starter" },
        { "@type": "Offer", "price": "2999", "priceCurrency": "INR", "name": "Professional" }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "120"
      },
      "description": "WhatsApp-first CRM and booking automation for Indian trekking and adventure operators."
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Will my WhatsApp number get banned if I use TrekOps?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. TrekOps uses the official Meta WhatsApp Business API (Cloud API). Your number is verified, gets the green tick, and has no daily message limits — completely safe from bans."
          }
        },
        {
          "@type": "Question",
          "name": "Can I redirect my Instagram, Facebook and Google ads to WhatsApp automatically?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. TrekOps supports click-to-WhatsApp ads. When a customer clicks your ad, our AI chatbot greets them, qualifies the lead, shares trek details and even confirms the booking — 24×7."
          }
        },
        {
          "@type": "Question",
          "name": "How long is the free trial?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Professional plan comes with a 30-day free trial. No credit card required. The Starter plan is free forever."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
